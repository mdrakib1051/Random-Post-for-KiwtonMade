<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KiwtonMade | Next-Gen Generator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-wrapper">
        <aside class="sidebar">
            <div class="logo">Kiwton<span>Made</span></div>
            <p class="tagline">Premium Content Engine v3.0</p>
            
            <div class="input-container">
                <div class="field">
                    <label>Badge Title</label>
                    <input type="text" id="t" placeholder="e.g. Premium Quality">
                </div>
                <div class="field">
                    <label>Product Price (৳)</label>
                    <input type="text" id="p" placeholder="3500">
                </div>
                <div class="field full">
                    <label>Image URLs (Comma separated for multiple)</label>
                    <textarea id="i" placeholder="url1, url2, url3..."></textarea>
                </div>
                <div class="field full">
                    <label>Short Description (Bengali/English)</label>
                    <textarea id="d" placeholder="পণ্যটি সম্পর্কে আকর্ষণীয় কিছু লিখুন..."></textarea>
                </div>
                <div class="field">
                    <label>Key Features (Comma separated)</label>
                    <textarea id="f" placeholder="Fast, Safe, Durable..."></textarea>
                </div>
                <div class="field">
                    <label>Specifications (Key:Value)</label>
                    <textarea id="s" placeholder="Material:Steel, Color:Black..."></textarea>
                </div>
                <div class="field">
                    <label>Perfect For</label>
                    <input type="text" id="pf" placeholder="e.g. Students">
                </div>
                <div class="field">
                    <label>Warranty</label>
                    <input type="text" id="w" placeholder="1 Year Guarantee">
                </div>
            </div>

            <button onclick="make()" class="primary-btn">GENERATE PREMIUM CODE</button>
        </aside>

        <main class="preview-area">
            <div class="output-header">
                <h3>Blogger HTML Output</h3>
                <button onclick="copyCode()" id="copyBtn">Copy Code</button>
            </div>
            <div class="code-wrapper">
                <textarea id="res" readonly placeholder="আপনার জেনারেট করা কোড এখানে দেখা যাবে..."></textarea>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
