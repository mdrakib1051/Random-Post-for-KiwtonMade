<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KiwtonMade | Premium Generator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Hind+Siliguri:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Kiwton<span>Made</span> Tool</h1>
            <p>Blogger XML Ready - No More Errors</p>
        </header>

        <div class="input-grid">
            <div class="group">
                <label>Badge Title</label>
                <input type="text" id="t" placeholder="e.g. Premium Choice">
            </div>
            <div class="group">
                <label>Price (৳)</label>
                <input type="text" id="p" placeholder="e.g. 3500">
            </div>
            <div class="group full">
                <label>Image Direct URL</label>
                <input type="text" id="i" placeholder="Paste link from postimg/imgur/google">
            </div>
            <div class="group full">
                <label>Short Description</label>
                <textarea id="d" placeholder="Catchy one-liner..."></textarea>
            </div>
            <div class="group">
                <label>Key Features (Comma separated)</label>
                <textarea id="f" placeholder="Fast Charging, Durable..."></textarea>
            </div>
            <div class="group">
                <label>Specs (Key:Value, Key:Value)</label>
                <textarea id="s" placeholder="Material:Metal, Color:Black..."></textarea>
            </div>
            <div class="group">
                <label>Perfect For</label>
                <input type="text" id="pf" placeholder="e.g. Daily Use">
            </div>
            <div class="group">
                <label>Warranty</label>
                <input type="text" id="w" placeholder="e.g. 1 Year">
            </div>
        </div>

        <button onclick="make()" class="gen-btn">GENERATE BLOGGER CODE</button>

        <div class="output-box">
            <div class="out-header">
                <span>Output Code</span>
                <button onclick="copyCode()" id="copyBtn">Copy</button>
            </div>
            <textarea id="res" readonly></textarea>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
