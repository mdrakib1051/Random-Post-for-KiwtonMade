<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KiwtonMade | Premium Engine</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&amp;family=Hind+Siliguri:wght@400;700&amp;display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">Kiwton<span>Made</span></div>
            <div class="input-form">
                <div class="field"><label>Badge Title</label><input type="text" id="t" placeholder="New Arrival"></div>
                <div class="field"><label>Price (৳)</label><input type="text" id="p" placeholder="3000"></div>
                <div class="field full"><label>Image URLs (Comma for Multiple)</label><textarea id="i" placeholder="url1, url2..."></textarea></div>
                <div class="field full"><label>Description</label><textarea id="d" placeholder="পণ্য সম্পর্কে লিখুন..."></textarea></div>
                <div class="field"><label>Features (Comma)</label><textarea id="f" placeholder="Feature 1, Feature 2"></textarea></div>
                <div class="field"><label>Specs (Key:Value)</label><textarea id="s" placeholder="Color:Black, Material:Metal"></textarea></div>
                <div class="field"><label>Perfect For</label><input type="text" id="pf" placeholder="Students"></div>
                <div class="field"><label>Warranty</label><input type="text" id="w" placeholder="1 Year"></div>
            </div>
            <button onclick="make()" class="gen-btn">GENERATE PREMIUM CODE</button>
        </aside>
        <main class="main-content">
            <div class="out-nav"><h3>Blogger Output</h3><button onclick="copyCode()" id="copyBtn">Copy Code</button></div>
            <div class="code-area"><textarea id="res" readonly></textarea></div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
